<!DOCTYPE html><html lang="en">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Vikram Tycoon</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"><style>

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Inter;
background:#000;
color:#fff;
overflow-x:hidden;
}

/* INTRO */

.intro{
position:fixed;
width:100%;
height:100vh;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.car{
width:300px;
animation:drive 2s linear forwards;
}

@keyframes drive{
0%{transform:translateX(-200px);}
100%{transform:translateX(120vw);}
}

/* MAIN */

.main{
opacity:0;
transition:1s;
}

/* HEADER */

header{
position:fixed;
width:100%;
padding:20px 50px;
display:flex;
justify-content:space-between;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:10;
}

.logo{
font-family:Playfair Display;
font-size:26px;
}

nav a{
margin-left:25px;
color:#fff;
text-decoration:none;
}

/* HERO */

.hero{
height:100vh;
background:url("https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=4000") center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero h1{
font-size:70px;
font-family:Playfair Display;
}

.hero p{
color:gold;
margin-top:10px;
}

/* NET WORTH */

.net{
padding:100px;
text-align:center;
background:#111;
}

.net h2{
font-size:50px;
color:gold;
}

/* BUSINESS */

.business{
padding:100px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
background:#111;
padding:30px;
border-radius:10px;
text-align:center;
}

/* QUOTES */

.quotes{
padding:100px;
}

.quote-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.quote{
background:#111;
padding:20px;
border-radius:10px;
font-size:14px;
}

</style></head><body><div class="intro">
<img src="https://images.unsplash.com/photo-1549921296-3ecf9c6a1d35?q=80&w=2000" class="car">
</div><div class="main"><header>
<div class="logo">Vikram Tycoon</div>
<nav>
<a href="#">Home</a>
<a href="#">Empire</a>
</nav>
</header><section class="hero">
<div>
<h1>Vikram Tycoon</h1>
<p>$1.2 Billion Business Empire</p>
</div>
</section><section class="net">
<h2>$1.2 Billion Net Worth</h2>
</section><section class="business"><h2>Business Empire</h2><div class="grid"><div class="card">Real Estate Developer</div>
<div class="card">TitanFlow Finance Owner</div>
<div class="card">Financier</div>
<div class="card">Crypto Investor</div></div></section><section class="quotes"><h2>Billionaire Mindset</h2><div class="quote-grid"><script>

let container=document.currentScript.parentElement

for(let i=1;i<=100;i++){

let div=document.createElement("div")
div.className="quote"
div.innerText=i+". Success comes from discipline, vision and long-term thinking."
container.appendChild(div)

}

</script></div></section></div><script>

window.onload=()=>{

setTimeout(()=>{
document.querySelector(".intro").style.display="none"
document.querySelector(".main").style.opacity="1"
},2000)

}

</script></body>
</html>
